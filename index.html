<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#2357d9"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="노무사 CBT"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icons/icon-192.png"><link rel="stylesheet" href="assets/css/app.css"><title>노무사 CBT V2.1</title></head><body><div class="app">
<header><div><span class="badge">V2 · 데이터 분리형</span><h1>노무사 노동법 CBT</h1><p>실제 기출 · 파트별 풀이 · 전 선지 해설 · 오답노트</p></div><button id="reset" class="btn ghost">기록 초기화</button></header>
<nav id="tabs"><button data-tab="past" class="active">실제 기출</button><button data-tab="practice">기출 기반 복습</button><button data-tab="wrong">오답노트</button><button data-tab="stats">통계</button><button data-tab="data">데이터</button></nav>
<main>
<section id="past" class="panel active"><div class="card setup"><h2>실제 기출 풀이</h2><div class="grid"><label>과목<select id="pastSubject"><option value="all">전체</option></select></label><label>회차<select id="pastRound"><option value="all">전체</option></select></label><label>파트<select id="pastPart"><option value="all">전체</option></select></label><label>문항 수<select id="pastCount"><option value="all">전부</option><option>5</option><option>10</option><option>20</option></select></label><label>법 기준<select id="lawMode"><option value="current">현행법 보정본</option><option value="original">기출 당시 원문</option></select></label></div><button id="startPast" class="btn primary">시작</button><p class="note">최근 5개년 제30회~제34회 노동법Ⅰ·Ⅱ 310문항을 수록했습니다. 스캔 원문은 이미지로 제공되며 텍스트 검수 상태가 표시됩니다.</p></div></section>
<section id="practice" class="panel"><div class="card setup"><h2>기출 기반 복습</h2><div class="grid"><label>파트<select id="practicePart"><option value="all">전체</option></select></label><label>유형<select id="practiceType"><option value="all">전체</option></select></label><label>문항 수<select id="practiceCount"><option>10</option><option>20</option><option>30</option><option value="all">전부</option></select></label><label>출제 방식<select id="practiceMode"><option value="all">전체 문제</option><option value="wrong">오답만</option><option value="unseen">미풀이만</option><option value="weak">취약 우선</option></select></label></div><button id="startPractice" class="btn primary">시작</button></div></section>
<section id="wrong" class="panel"><div class="card"><div class="row"><h2>오답노트</h2><button id="retryWrong" class="btn primary">오답 다시 풀기</button></div><div id="wrongList"></div></div></section>
<section id="stats" class="panel"><div id="statsCards" class="stats"></div><div class="card"><h2>파트별 성적</h2><div id="partStats"></div></div></section>
<section id="data" class="panel"><div class="card"><h2>데이터 구조</h2><p>새 기출은 <code>data/past/연도-회차.json</code> 파일로 추가하고 <code>data/catalog.json</code>에 한 줄 등록하면 됩니다.</p><div class="actions"><button id="exportProgress" class="btn ghost">학습기록 백업</button><label class="btn ghost">학습기록 복원<input id="importProgress" type="file" hidden accept="application/json"></label></div><pre id="dataSummary"></pre></div></section>
</main>
<div id="quiz" class="card hidden"><div class="row"><div><b id="qIndex"></b><div id="qMeta" class="meta"></div></div><button id="quit" class="btn ghost">종료</button></div><div class="progress"><i id="bar"></i></div><div id="correction"></div><h2 id="qText"></h2><div id="questionImage" class="question-image"></div><div id="options"></div><input id="textAnswer" class="hidden answer" placeholder="정답 입력"><div class="actions"><button id="submit" class="btn primary">정답 확인</button><button id="next" class="btn ghost hidden">다음</button></div><div id="feedback"></div></div>
<footer>GitHub Pages에서 실행되며 기록은 현재 브라우저에 저장됩니다.</footer></div><script type="module" src="assets/js/app.js"></script></body></html>
